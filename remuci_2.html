<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexAdmin - REMU-CI VisionExtract</title>
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json?v=3">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="REMU-CI">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        /* Layout principal */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar modernisée */
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 12px 24px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: #3b82f6;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            padding: 8px 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #475569;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-item.active {
            background: #eef2ff;
            color: #3b82f6;
        }

        .nav-item i {
            width: 20px;
            font-size: 1.1rem;
        }

        /* Main content */
        .main {
            flex: 1;
            margin-left: 280px;
            padding: 24px 32px;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 8px 16px;
            width: 400px;
        }

        .search-bar i {
            color: #94a3b8;
            margin-right: 12px;
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 0.95rem;
            background: transparent;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #eef2ff;
            color: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .kpi-label {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .kpi-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
        }

        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }

        /* Charts row */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .chart-period {
            display: flex;
            gap: 8px;
        }

        .period-btn {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #64748b;
        }

        .period-btn:hover {
            background: #f1f5f9;
        }

        .period-btn.active {
            background: #eef2ff;
            color: #3b82f6;
        }

        /* Tables */
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 24px;
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .view-all {
            color: #3b82f6;
            cursor: pointer;
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            color: #64748b;
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
        }

        .status-success {
            background: #d1fae5;
            color: #10b981;
        }

        .status-warning {
            background: #fff7ed;
            color: #f97316;
        }

        .status-danger {
            background: #fee2e2;
            color: #ef4444;
        }

        .status-info {
            background: #e0f2fe;
            color: #0ea5e9;
        }

        /* Activity list */
        .activity-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* Filters panel */
        .filters-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #475569;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            border-color: #3b82f6;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 20px;
        }

        .page-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover {
            background: #f1f5f9;
        }

        .page-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .page-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Login Screen */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo h1 {
            font-size: 2rem;
            color: #0f172a;
        }

        .login-logo span {
            color: #3b82f6;
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f1f5f9;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1280px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
                padding: 24px 8px;
            }
            .sidebar .nav-item span,
            .sidebar .logo span,
            .sidebar .nav-section-title {
                display: none;
            }
            .sidebar .logo {
                justify-content: center;
            }
            .main {
                margin-left: 80px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main {
                margin-left: 0;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .search-bar {
                width: 100%;
            }
            .header {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <h1>Flex<span>Admin</span></h1>
                <p style="color: #64748b; margin-top: 8px;">REMU-CI VisionExtract</p>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Entrez votre nom d'utilisateur" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
            </div>
            
            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Mot de passe</label>
                <input type="password" id="password" placeholder="Entrez votre mot de passe" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
            </div>
            
            <button class="btn btn-primary" style="width: 100%;" onclick="login()">Se connecter</button>
        </div>
    </div>

    <!-- Main Application -->
    <div class="app" id="app-container" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
                <span>Flex<span>Admin</span></span>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Main</div>
                <div class="nav-item active" data-target="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-target="credits">
                    <i class="fas fa-university"></i>
                    <span>Crédits débloqués</span>
                </div>
                <div class="nav-item" data-target="clients">
                    <i class="fas fa-users"></i>
                    <span>Nouveaux clients</span>
                </div>
                <div class="nav-item" data-target="accounts">
                    <i class="fas fa-piggy-bank"></i>
                    <span>Comptes ouverts</span>
                </div>
                <div class="nav-item" data-target="unpaid">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Crédits impayés</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Analyse</div>
                <div class="nav-item" data-target="active">
                    <i class="fas fa-user-check"></i>
                    <span>Clients actifs</span>
                </div>
                <div class="nav-item" data-target="genre">
                    <i class="fas fa-venus-mars"></i>
                    <span>Analyse par genre</span>
                </div>
                <div class="nav-item" data-target="shares">
                    <i class="fas fa-chart-pie"></i>
                    <span>Parts sociales</span>
                </div>
                <div class="nav-item" data-target="schedule">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Échéances futures</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Productivity Apps</div>
                <div class="nav-item" data-target="balance">
                    <i class="fas fa-balance-scale"></i>
                    <span>Balance J-1</span>
                </div>
                <div class="nav-item" data-target="ledger">
                    <i class="fas fa-book"></i>
                    <span>Grand livre</span>
                </div>
                <div class="nav-item" data-target="scheduler">
                    <i class="fas fa-clock"></i>
                    <span>Planificateur</span>
                </div>
                <div class="nav-item" data-target="logs">
                    <i class="fas fa-history"></i>
                    <span>Journal d'activité</span>
                </div>
            </div>

            <div style="margin-top: auto; padding: 20px 12px;">
                <div class="nav-item" style="background: #f8fafc;">
                    <i class="fas fa-headset"></i>
                    <span>Support Center</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main">
            <!-- Header -->
            <div class="header">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search users, invoices, tickets...">
                </div>
                
                <div class="user-menu">
                    <div class="notification-badge">
                        <i class="far fa-bell"></i>
                    </div>
                    <div class="avatar" id="user-avatar">AD</div>
                </div>
            </div>

            <!-- Dynamic Content -->
            <div id="dynamic-content"></div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const API_BASE = '';
        let currentUser = null;
        let paginationState = {};

        // ============ AUTHENTIFICATION ============
        async function checkExistingSession() {
            try {
                const response = await fetch('/api/check-session', {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.authenticated) {
                        currentUser = result.username;
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('app-container').style.display = 'flex';
                        updateUserDisplay(result.username);
                        showDashboard();
                        return;
                    }
                }
            } catch (error) {
                console.log('Pas de session valide');
            }
            
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Veuillez entrer vos identifiants');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentUser = username;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    updateUserDisplay(username);
                    showDashboard();
                } else {
                    alert('Identifiants incorrects');
                }
            } catch (error) {
                console.error('Erreur connexion:', error);
                alert('Erreur de connexion au serveur');
            }
        }

        async function logout() {
            try {
                await fetch('/logout', { 
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                console.error('Erreur déconnexion:', error);
            } finally {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            }
        }

        function updateUserDisplay(username) {
            const avatar = document.getElementById('user-avatar');
            if (avatar) {
                const initials = username.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                avatar.textContent = initials || 'AD';
            }
        }

        // ============ NAVIGATION ============
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
            
            const menuItems = document.querySelectorAll('.nav-item');
            menuItems.forEach(item => {
                item.addEventListener('click', function() {
                    const target = this.getAttribute('data-target');
                    
                    menuItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    
                    if (target === 'dashboard') {
                        showDashboard();
                    } else {
                        loadView(target);
                    }
                });
            });
        });

        // ============ DASHBOARD ============
        async function showDashboard() {
            const content = document.getElementById('dynamic-content');
            
            content.innerHTML = `
                <div class="kpi-grid" id="dashboard-kpis">
                    <div class="kpi-card">
                        <div class="loading-spinner"></div>
                    </div>
                    <div class="kpi-card">
                        <div class="loading-spinner"></div>
                    </div>
                    <div class="kpi-card">
                        <div class="loading-spinner"></div>
                    </div>
                    <div class="kpi-card">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
                
                <div class="charts-row">
                    <div class="chart-card">
                        <div class="chart-header">
                            <div class="chart-title">Revenue Flow</div>
                            <div class="chart-period">
                                <span class="period-btn active">Monthly</span>
                                <span class="period-btn">Quarterly</span>
                                <span class="period-btn">Yearly</span>
                            </div>
                        </div>
                        <div style="height: 300px; display: flex; align-items: center; justify-content: center;">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                    
                    <div class="chart-card">
                        <div class="chart-header">
                            <div class="chart-title">Traffic Sources</div>
                        </div>
                        <div style="height: 300px; display: flex; align-items: center; justify-content: center;">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
                
                <div class="activity-card">
                    <div class="table-header">
                        <div class="table-title">Recent Activity</div>
                        <span class="view-all">View All</span>
                    </div>
                    <div style="display: flex; align-items: center; justify-content: center; padding: 40px;">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            `;
            
            loadDashboardData();
        }

        async function loadDashboardData() {
            try {
                const response = await fetch('/api/dashboard-data', {
                    credentials: 'include'
                });
                
                if (!response.ok) throw new Error('Erreur API');
                
                const result = await response.json();
                
                if (result.success) {
                    updateDashboardKPIs(result.data);
                }
            } catch (error) {
                console.error('Erreur dashboard:', error);
            }
        }

        function updateDashboardKPIs(data) {
            const kpis = [
                { value: data.credits_debloques, label: 'Crédits débloqués', unit: 'FCFA', trend: '+12.5%', icon: 'university' },
                { value: data.nouveaux_clients, label: 'Nouveaux clients', unit: '', trend: '+5.8%', icon: 'users' },
                { value: data.comptes_ouverts, label: 'Comptes ouverts', unit: '', trend: '-3.1%', icon: 'piggy-bank' },
                { value: data.taux_impayes, label: "Taux d'impayés", unit: '%', trend: '+1.2%', icon: 'exclamation-triangle' }
            ];
            
            const kpiGrid = document.getElementById('dashboard-kpis');
            
            kpiGrid.innerHTML = kpis.map(kpi => `
                <div class="kpi-card">
                    <div class="kpi-header">
                        <span>${kpi.label}</span>
                        <div class="kpi-icon">
                            <i class="fas fa-${kpi.icon}"></i>
                        </div>
                    </div>
                    <div class="kpi-value">
                        ${typeof kpi.value === 'number' ? kpi.value.toLocaleString('fr-FR') : kpi.value}${kpi.unit}
                    </div>
                    <div class="kpi-trend ${kpi.trend.startsWith('+') ? 'trend-up' : 'trend-down'}">
                        <i class="fas fa-${kpi.trend.startsWith('+') ? 'arrow-up' : 'arrow-down'}"></i>
                        ${kpi.trend} vs last month
                    </div>
                </div>
            `).join('');
        }

        // ============ VUES DYNAMIQUES ============
        async function loadView(type) {
            const content = document.getElementById('dynamic-content');
            
            // Mapping des titres
            const titles = {
                'credits': 'Crédits débloqués',
                'clients': 'Nouveaux clients',
                'accounts': 'Comptes ouverts',
                'unpaid': 'Crédits impayés',
                'active': 'Clients actifs',
                'genre': 'Analyse par genre',
                'shares': 'Parts sociales',
                'schedule': 'Échéances futures',
                'balance': 'Balance J-1',
                'ledger': 'Grand livre'
            };
            
            content.innerHTML = `
                <div class="filters-panel">
                    <div class="table-header">
                        <div class="table-title">${titles[type] || type}</div>
                    </div>
                    
                    <div id="filters-${type}" class="filters-grid">
                        <div class="loading-spinner"></div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="fetchData('${type}')">
                            <i class="fas fa-search"></i> Rechercher
                        </button>
                        <button class="btn btn-success" onclick="exportToExcel('${type}')">
                            <i class="fas fa-download"></i> Exporter
                        </button>
                    </div>
                </div>
                
                <div class="table-container">
                    <div id="results-${type}">
                        <div style="text-align: center; padding: 60px; color: #64748b;">
                            <i class="fas fa-chart-bar" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                            <p>Sélectionnez des filtres et cliquez sur "Rechercher"</p>
                        </div>
                    </div>
                </div>
            `;
            
            // Charger les filtres appropriés
            loadFilters(type);
        }

        function loadFilters(type) {
            const filtersContainer = document.getElementById(`filters-${type}`);
            
            const filters = {
                'credits': `
                    <div class="filter-group">
                        <label>Agence</label>
                        <select id="agence">
                            <option value="">Toutes les agences</option>
                            <option value="FAÎTIERE">FAÎTIERE</option>
                            <option value="REMUCI : AGENCE-BONOUA">AGENCE-BONOUA</option>
                            <option value="REMUCI : AGENCE-ABOISSO">AGENCE-ABOISSO</option>
                            <option value="REMUCI : AGENCE-BASSAM">AGENCE-BASSAM</option>
                            <option value="REMUCI : AGENCE-AGBOVILLE">AGENCE-AGBOVILLE</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Gestionnaire</label>
                        <select id="gestionnaire">
                            <option value="">Tous</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Date début</label>
                        <input type="date" id="date_debut" value="${getDefaultDateStart()}">
                    </div>
                    <div class="filter-group">
                        <label>Date fin</label>
                        <input type="date" id="date_fin" value="${getToday()}">
                    </div>
                `,
                
                'unpaid': `
                    <div class="filter-group">
                        <label>Agence</label>
                        <select id="agence">
                            <option value="">Toutes les agences</option>
                            <option value="FAÎTIERE">FAÎTIERE</option>
                            <option value="REMUCI : AGENCE-BONOUA">AGENCE-BONOUA</option>
                            <option value="REMUCI : AGENCE-ABOISSO">AGENCE-ABOISSO</option>
                            <option value="REMUCI : AGENCE-BASSAM">AGENCE-BASSAM</option>
                            <option value="REMUCI : AGENCE-AGBOVILLE">AGENCE-AGBOVILLE</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Gestionnaire</label>
                        <select id="gestionnaire">
                            <option value="">Tous</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Type crédit</label>
                        <select id="type_credit">
                            <option value="">Tous</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Client</label>
                        <input type="text" id="client" placeholder="Nom client">
                    </div>
                    <div class="filter-group">
                        <label>Jours retard min</label>
                        <input type="number" id="jours_retard_min" placeholder="Min">
                    </div>
                    <div class="filter-group">
                        <label>Jours retard max</label>
                        <input type="number" id="jours_retard_max" placeholder="Max">
                    </div>
                `,
                
                'active': `
                    <div class="filter-group">
                        <label>Agence</label>
                        <select id="agence">
                            <option value="">Toutes</option>
                            <option value="FAÎTIERE">FAÎTIERE</option>
                            <option value="REMUCI : AGENCE-BONOUA">AGENCE-BONOUA</option>
                            <option value="REMUCI : AGENCE-ABOISSO">AGENCE-ABOISSO</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Gestionnaire</label>
                        <select id="gestionnaire">
                            <option value="">Tous</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Type client</label>
                        <select id="type_client">
                            <option value="">Tous</option>
                            <option value="PARTICULIER">Particulier</option>
                            <option value="ENTREPRISE">Entreprise</option>
                            <option value="GROUPE">Groupe</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Produit</label>
                        <select id="produit">
                            <option value="">Tous</option>
                            <option value="EPARGNE">Épargne</option>
                            <option value="CREDIT">Crédit</option>
                            <option value="LES_DEUX">Les deux</option>
                        </select>
                    </div>
                `
            };
            
            if (filters[type]) {
                filtersContainer.innerHTML = filters[type];
                if (type === 'credits' || type === 'unpaid' || type === 'active') {
                    loadGestionnaires();
                }
                if (type === 'unpaid') {
                    loadTypesCredit();
                }
            }
        }

        // ============ FONCTIONS API ============
        async function fetchData(type) {
            const resultsDiv = document.getElementById(`results-${type}`);
            if (!resultsDiv) return;
            
            resultsDiv.innerHTML = `
                <div style="text-align: center; padding: 60px;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 20px; color: #64748b;">Chargement des données...</p>
                </div>
            `;

            try {
                let url = `/api/${getEndpoint(type)}?`;
                const params = [];
                
                // Récupérer les filtres communs
                const agence = document.getElementById('agence')?.value || '';
                const gestionnaire = document.getElementById('gestionnaire')?.value || '';
                
                if (agence) params.push(`agence=${encodeURIComponent(agence)}`);
                if (gestionnaire && gestionnaire !== 'Tous les gestionnaires') {
                    params.push(`gestionnaire=${encodeURIComponent(gestionnaire)}`);
                }
                
                // Filtres spécifiques
                if (type === 'credits' || type === 'clients') {
                    const date_debut = document.getElementById('date_debut')?.value || getDefaultDateStart();
                    const date_fin = document.getElementById('date_fin')?.value || getToday();
                    params.push(`date_debut=${encodeURIComponent(date_debut)}`);
                    params.push(`date_fin=${encodeURIComponent(date_fin)}`);
                }
                
                if (type === 'unpaid') {
                    const type_credit = document.getElementById('type_credit')?.value || '';
                    const client = document.getElementById('client')?.value || '';
                    const jours_retard_min = document.getElementById('jours_retard_min')?.value || '';
                    const jours_retard_max = document.getElementById('jours_retard_max')?.value || '';
                    
                    if (type_credit) params.push(`type_credit=${encodeURIComponent(type_credit)}`);
                    if (client) params.push(`client=${encodeURIComponent(client)}`);
                    if (jours_retard_min) params.push(`jours_retard_min=${jours_retard_min}`);
                    if (jours_retard_max) params.push(`jours_retard_max=${jours_retard_max}`);
                }
                
                if (type === 'active') {
                    const type_client = document.getElementById('type_client')?.value || '';
                    const produit = document.getElementById('produit')?.value || '';
                    if (type_client) params.push(`type_client=${encodeURIComponent(type_client)}`);
                    if (produit) params.push(`produit=${encodeURIComponent(produit)}`);
                }
                
                url += params.join('&');
                
                const response = await fetch(url, { credentials: 'include' });
                
                if (!response.ok) throw new Error(`Erreur HTTP: ${response.status}`);
                
                const result = await response.json();
                
                if (result.success && result.data && result.data.length > 0) {
                    displayResults(type, result.data);
                } else {
                    resultsDiv.innerHTML = `
                        <div style="text-align: center; padding: 60px; color: #64748b;">
                            <i class="fas fa-inbox" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                            <p>Aucune donnée trouvée</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Erreur:', error);
                resultsDiv.innerHTML = `
                    <div style="text-align: center; padding: 60px; color: #ef4444;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <p>Erreur: ${error.message}</p>
                        <button class="btn btn-primary" onclick="fetchData('${type}')" style="margin-top: 20px;">
                            Réessayer
                        </button>
                    </div>
                `;
            }
        }

        function getEndpoint(type) {
            const endpoints = {
                'credits': 'credits-debloques',
                'clients': 'nouveaux-clients',
                'accounts': 'comptes-ouverts',
                'unpaid': 'credits-impayes',
                'active': 'clients-actifs',
                'genre': 'analyse-genre'
            };
            return endpoints[type] || type;
        }

        function displayResults(type, data) {
            const resultsDiv = document.getElementById(`results-${type}`);
            if (!resultsDiv || !data.length) return;
            
            const headers = Object.keys(data[0]);
            
            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            ${headers.map(header => `<th>${header}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            data.slice(0, 10).forEach(row => {
                tableHtml += '<tr>';
                headers.forEach(header => {
                    const value = row[header];
                    let displayValue = value;
                    
                    if (value === null || value === undefined) displayValue = '';
                    else if (typeof value === 'number') {
                        if (value >= 1000) displayValue = value.toLocaleString('fr-FR');
                        else displayValue = value.toString();
                    }
                    
                    tableHtml += `<td>${displayValue}</td>`;
                });
                tableHtml += '</tr>';
            });
            
            tableHtml += `
                    </tbody>
                </table>
                <div class="pagination">
                    <button class="page-btn disabled"><i class="fas fa-chevron-left"></i></button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
            `;
            
            resultsDiv.innerHTML = tableHtml;
        }

        // ============ FONCTIONS UTILITAIRES ============
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function getDefaultDateStart() {
            const date = new Date();
            date.setMonth(date.getMonth() - 4);
            return date.toISOString().split('T')[0];
        }

        async function loadGestionnaires() {
            try {
                const response = await fetch('/api/gestionnaires', {
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                const select = document.getElementById('gestionnaire');
                if (select && result.success && result.data) {
                    select.innerHTML = '<option value="">Tous les gestionnaires</option>';
                    result.data.forEach(g => {
                        if (g.nom) {
                            const option = document.createElement('option');
                            option.value = g.nom;
                            option.textContent = g.nom;
                            select.appendChild(option);
                        }
                    });
                }
            } catch (error) {
                console.error('Erreur chargement gestionnaires:', error);
            }
        }

        async function loadTypesCredit() {
            try {
                const response = await fetch('/api/types-credit', {
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                const select = document.getElementById('type_credit');
                if (select && result.success && result.data) {
                    select.innerHTML = '<option value="">Tous les types</option>';
                    result.data.forEach(t => {
                        if (t.nom) {
                            const option = document.createElement('option');
                            option.value = t.nom;
                            option.textContent = t.nom;
                            select.appendChild(option);
                        }
                    });
                }
            } catch (error) {
                console.error('Erreur chargement types crédit:', error);
            }
        }

        async function exportToExcel(type) {
            const endpoint = getEndpoint(type);
            if (!endpoint) return;
            
            try {
                const params = new URLSearchParams();
                
                const agence = document.getElementById('agence')?.value;
                if (agence) params.append('agence', agence);
                
                const gestionnaire = document.getElementById('gestionnaire')?.value;
                if (gestionnaire && gestionnaire !== 'Tous les gestionnaires') {
                    params.append('gestionnaire', gestionnaire);
                }
                
                if (type === 'credits') {
                    const date_debut = document.getElementById('date_debut')?.value || getDefaultDateStart();
                    const date_fin = document.getElementById('date_fin')?.value || getToday();
                    params.append('date_debut', date_debut);
                    params.append('date_fin', date_fin);
                }
                
                const url = `/api/export-excel/${endpoint}?${params.toString()}`;
                window.location.href = url;
                
            } catch (error) {
                console.error('Erreur export:', error);
                alert('Erreur lors de l\'export');
            }
        }

        // ============ SERVICE WORKER ============
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW enregistré'))
                    .catch(err => console.log('SW erreur:', err));
            });
        }
    </script>
</body>
</html>
